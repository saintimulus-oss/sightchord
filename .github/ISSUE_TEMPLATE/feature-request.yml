name: Feature request
description: Suggest a new practice workflow, lesson, or launch improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      placeholder: It is hard to compare multiple harmonic interpretations while practicing.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Add a compare alternatives mode in the analyzer panel.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Practice Generator
        - Smart Generator
        - Chord Analyzer
        - Study Harmony
        - Audio / Playback
        - Store / Launch
        - Localization
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Share user stories, screenshots, or related links if available.
